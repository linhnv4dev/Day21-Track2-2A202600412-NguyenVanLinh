name: MLOps Pipeline

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    # ---------------------------------------------------------------------------
    # JOB 1 - UNIT TEST
    # ---------------------------------------------------------------------------
    test:
        name: Unit Test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.10'

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run unit tests
              run: pytest tests/ -v

    # ---------------------------------------------------------------------------
    # JOB 2 - TRAIN
    # ---------------------------------------------------------------------------
    train:
        name: Train
        needs: test
        runs-on: ubuntu-latest

        outputs:
            accuracy: ${{ steps.read_metrics.outputs.accuracy }}

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.10'

            - name: Install dependencies
              run: pip install -r requirements.txt

            # ---------------- AWS ENV (FIX DVC ERROR) ----------------
            - name: Set AWS credentials
              run: |
                  echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
                  echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
                  echo "AWS_REGION=ap-southeast-1" >> $GITHUB_ENV
                  echo "CLOUD_BUCKET=${{ secrets.CLOUD_BUCKET }}" >> $GITHUB_ENV

            # ---------------- DVC PULL FROM S3 ----------------
            - name: Pull data with DVC
              run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

            # ---------------- TRAIN ----------------
            - name: Train model
              run: python src/train.py

            # ---------------- READ METRICS ----------------
            - name: Read metrics
              id: read_metrics
              run: |
                  ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
                  echo "accuracy=$ACC" >> $GITHUB_OUTPUT

            # ---------------- UPLOAD MODEL TO S3 ----------------
            - name: Upload model to S3
              run: |
                  aws s3 cp models/model.pkl s3://${{ secrets.CLOUD_BUCKET }}/models/latest/model.pkl

            # ---------------- SAVE ARTIFACT ----------------
            - name: Save metrics artifact
              uses: actions/upload-artifact@v4
              with:
                  name: metrics
                  path: outputs/metrics.json

    # ---------------------------------------------------------------------------
    # JOB 3 - EVAL
    # ---------------------------------------------------------------------------
    eval:
        name: Eval
        needs: train
        runs-on: ubuntu-latest

        steps:
            - name: Check accuracy gate
              run: |
                  python - <<'EOF'
                  acc = float("${{ needs.train.outputs.accuracy }}")

                  if acc < 0.68:
                      raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.68")

                  print(f"PASSED: accuracy {acc:.4f}")
                  EOF

    # ---------------------------------------------------------------------------
    # JOB 4 - DEPLOY (EC2)
    # ---------------------------------------------------------------------------
    deploy:
        name: Deploy
        needs: eval
        runs-on: ubuntu-latest

        steps:
            - name: SSH Deploy to EC2
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VM_HOST }}
                  username: ${{ secrets.VM_USER }}
                  key: ${{ secrets.VM_SSH_KEY }}
                  script: |
                      sudo systemctl restart mlops-serve
                      sleep 5
                      curl -sf http://localhost:8000/health && echo "OK" || exit 1
